<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRU Search – ThinkPad Parts</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23111111'/><text x='50' y='60' font-size='42' text-anchor='middle' fill='white' font-family='Arial'>FRU</text></svg>">
</head>
<body>
  <main class="app">

    <!-- Header -->
    <div class="top">
      <h1>FRU</h1>
      <span class="sub">parts database</span>
    </div>

    <!-- Search Section -->
    <div class="search-section">
      <div class="search-wrapper">
        <input
          type="text"
          id="searchInput"
          placeholder="Search by FRU, description, or model..."
          autofocus
        >
        <button id="searchButton" class="search-btn">Search</button>
      </div>
    </div>

    <!-- Dropdown Filters Section -->
    <div class="dropdown-row">
      <!-- Model Dropdown -->
      <div class="dropdown-group">
        <div class="filter-label">Model</div>
        <select id="modelSelect" class="filter-select">
          <option value="all">All Models</option>
          <option value="X240">X240</option>
          <option value="X250">X250</option>
          <option value="X260">X260</option>
          <option value="X270">X270</option>
        </select>
      </div>

      <!-- Category Dropdown -->
      <div class="dropdown-group">
        <div class="filter-label">Category</div>
        <select id="categorySelect" class="filter-select">
          <option value="all">All Categories</option>
          <option value="AC ADAPTERS">AC Adapters</option>
          <option value="BATTERIES">Batteries</option>
          <option value="MEMORY">Memory</option>
          <option value="MEMORY DIMM'S">Memory DIMMs</option>
          <option value="WIRELESS CARDS">Wireless Cards</option>
          <option value="WIRELESS AND SUBCARDS">Wireless & Subcards</option>
          <option value="LCD'S">LCD Panels</option>
          <option value="THERMALS">Thermals</option>
          <option value="THERMAL ASSEMBLIES">Thermal Assemblies</option>
          <option value="SPEAKERS">Speakers</option>
          <option value="KEYBOARDS">Keyboards</option>
          <option value="HDD'S">Hard Drives</option>
          <option value="SSD'S">SSDs</option>
          <option value="PLANARS">Planars</option>
          <option value="CAMERAS">Cameras</option>
          <option value="CABLES">Cables</option>
          <option value="LINE CORDS">Power Cords</option>
          <option value="HINGES">Hinges</option>
          <option value="ANTENNAS">Antennas</option>
          <option value="BEZELS">Bezels</option>
          <option value="BRACKETS">Brackets</option>
          <option value="COVERS">Covers</option>
          <option value="RECOVERY MEDIA">Recovery Media</option>
          <option value="MECHANICALS">Mechanicals</option>
          <option value="DOCKS">Docks</option>
          <option value="DONGLES">Dongles</option>
          <option value="EXTERNAL BATTERIES">External Batteries</option>
          <option value="INTERNAL BATTERIES">Internal Batteries</option>
          <option value="SUB CARDS">Sub Cards</option>
          <option value="MISC CARDS">Misc Cards</option>
          <option value="CARD READERS">Card Readers</option>
          <option value="CARDS VARIOUS">Cards Various</option>
          <option value="TRACKPOINT CAPS">Trackpoint Caps</option>
          <option value="RUBBER FEET">Rubber Feet</option>
          <option value="RUBBER KIT">Rubber Kit</option>
          <option value="LABELS">Labels</option>
          <option value="MICROPHONE">Microphone</option>
          <option value="General">General</option>
        </select>
      </div>
    </div>

    <!-- Results count -->
    <div id="resultsCount" class="meta"></div>

    <!-- Results list -->
    <div id="results" class="list"></div>

    <!-- Footer -->
    <footer>
      <small>ThinkPad X240 · X250 · X260 · X270 FRU Database</small>
    </footer>

  </main>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
