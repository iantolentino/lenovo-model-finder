<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRU Search – ThinkPad Parts</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23111111'/><text x='50' y='60' font-size='42' text-anchor='middle' fill='white' font-family='Arial'>FRU</text></svg>">
</head>
<body>
  <main class="app">

    <!-- Header -->
    <div class="top">
      <h1>FRU</h1>
      <span class="sub">parts database</span>
    </div>

    <!-- Search Section -->
    <div class="search-section">
      <div class="search-wrapper">
        <input
          type="text"
          id="searchInput"
          placeholder="Search by FRU, description, or model..."
          autofocus
        >
        <button id="searchButton" class="search-btn">Search</button>
      </div>
    </div>

    <!-- Model Filters -->
    <div class="filter-section">
      <div class="filter-label">Model</div>
      <div class="filters">
        <button class="filter-model active" data-model="all">All</button>
        <button class="filter-model" data-model="X240">X240</button>
        <button class="filter-model" data-model="X250">X250</button>
        <button class="filter-model" data-model="X260">X260</button>
        <button class="filter-model" data-model="X270">X270</button>
      </div>
    </div>

    <!-- Category Filters - Using exact names from your data -->
    <div class="filter-section">
      <div class="filter-label">Category</div>
      <div class="filters">
        <button class="filter-cat active" data-category="all">All</button>
        <button class="filter-cat" data-category="AC ADAPTERS">AC Adapters</button>
        <button class="filter-cat" data-category="BATTERIES">Batteries</button>
        <button class="filter-cat" data-category="MEMORY">Memory</button>
        <button class="filter-cat" data-category="MEMORY DIMM'S">Memory DIMMs</button>
        <button class="filter-cat" data-category="WIRELESS CARDS">Wireless Cards</button>
        <button class="filter-cat" data-category="WIRELESS AND SUBCARDS">Wireless & Subcards</button>
        <button class="filter-cat" data-category="LCD'S">LCD Panels</button>
        <button class="filter-cat" data-category="THERMALS">Thermals</button>
        <button class="filter-cat" data-category="THERMAL ASSEMBLIES">Thermal Assemblies</button>
        <button class="filter-cat" data-category="SPEAKERS">Speakers</button>
        <button class="filter-cat" data-category="KEYBOARDS">Keyboards</button>
        <button class="filter-cat" data-category="HDD'S">Hard Drives</button>
        <button class="filter-cat" data-category="SSD'S">SSDs</button>
        <button class="filter-cat" data-category="PLANARS">Planars</button>
        <button class="filter-cat" data-category="CAMERAS">Cameras</button>
        <button class="filter-cat" data-category="CABLES">Cables</button>
        <button class="filter-cat" data-category="LINE CORDS">Power Cords</button>
        <button class="filter-cat" data-category="HINGES">Hinges</button>
        <button class="filter-cat" data-category="ANTENNAS">Antennas</button>
        <button class="filter-cat" data-category="BEZELS">Bezels</button>
        <button class="filter-cat" data-category="BRACKETS">Brackets</button>
        <button class="filter-cat" data-category="COVERS">Covers</button>
        <button class="filter-cat" data-category="RECOVERY MEDIA">Recovery Media</button>
        <button class="filter-cat" data-category="MECHANICALS">Mechanicals</button>
        <button class="filter-cat" data-category="DOCKS">Docks</button>
        <button class="filter-cat" data-category="DONGLES">Dongles</button>
        <button class="filter-cat" data-category="EXTERNAL BATTERIES">External Batteries</button>
        <button class="filter-cat" data-category="INTERNAL BATTERIES">Internal Batteries</button>
        <button class="filter-cat" data-category="SUB CARDS">Sub Cards</button>
        <button class="filter-cat" data-category="MISC CARDS">Misc Cards</button>
        <button class="filter-cat" data-category="CARD READERS">Card Readers</button>
        <button class="filter-cat" data-category="CARDS VARIOUS">Cards Various</button>
        <button class="filter-cat" data-category="TRACKPOINT CAPS">Trackpoint Caps</button>
        <button class="filter-cat" data-category="RUBBER FEET">Rubber Feet</button>
        <button class="filter-cat" data-category="RUBBER KIT">Rubber Kit</button>
        <button class="filter-cat" data-category="LABELS">Labels</button>
        <button class="filter-cat" data-category="MICROPHONE">Microphone</button>
        <button class="filter-cat" data-category="General">General</button>
      </div>
    </div>

    <!-- Results count -->
    <div id="resultsCount" class="meta"></div>

    <!-- Results list -->
    <div id="results" class="list"></div>

    <!-- Footer -->
    <footer>
      <small>ThinkPad X240 · X250 · X260 · X270 FRU Database</small>
    </footer>

  </main>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
