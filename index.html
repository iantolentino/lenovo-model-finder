<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRU Search – ThinkPad Parts</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230f172a'/><text x='50' y='60' font-size='42' text-anchor='middle' fill='white' font-family='Arial'>LMF</text></svg>">
</head>
<body>
  <main class="app">

    <!-- Top bar -->
    <div class="top">
      <h1>FRU</h1>
      <span class="sub">search</span>
    </div>

    <!-- Search -->
    <input
      type="text"
      id="searchInput"
      placeholder="Search FRU, model, description..."
      autofocus
    >

    <!-- Meta -->
    <div id="resultsCount" class="meta"></div>

    <!-- Results -->
    <div id="results" class="list"></div>

    <!-- Footer -->
    <footer>
      <small>ThinkPad X240–X270 FRU data</small>
    </footer>

  </main>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
