<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRU Search – ThinkPad Parts</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23111111'/><text x='50' y='60' font-size='42' text-anchor='middle' fill='white' font-family='Arial'>FRU</text></svg>">
</head>
<body>
  <main class="app">

    <div class="top">
      <h1>FRU</h1>
      <span class="sub">parts database</span>
    </div>

    <div class="search-section">
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search by FRU, description, or model..." autofocus>
        <button id="searchButton" class="search-btn">Search</button>
      </div>
    </div>

    <div class="dropdown-row">
      <div class="dropdown-group">
        <div class="filter-label">Model</div>
        <select id="modelSelect" class="filter-select">
          <option value="all">All Models</option>
          <!-- Populated from JSON -->
        </select>
      </div>
      <div class="dropdown-group">
        <div class="filter-label">Category</div>
        <select id="categorySelect" class="filter-select">
          <option value="all">All Categories</option>
          <!-- Populated from JSON -->
        </select>
      </div>
    </div>

    <div id="resultsCount" class="meta"></div>
    <div id="results" class="list"></div>

    <footer>
      <small>ThinkPad X240 · X250 · X260 · X270 FRU Database</small>
      <button id="clearCacheBtn" class="cache-btn">Clear Cache</button>
    </footer>

  </main>
  <script type="module" src="js/utils.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
